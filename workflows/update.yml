name: Update RBI ATM dashboard

# This report is monthly, so it's checked a few times a day to catch new months and
# "Revised" re-issues promptly. The build script's no-change guard means runs that find
# nothing new do nothing. Off-peak minute (:23) to dodge GitHub scheduler congestion.
# Lands ~ 09:53, 15:53, 21:53 IST. Also runnable by hand from the Actions tab.
on:
  schedule:
    - cron: "23 4,10,16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: rbi-atm-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape RBI ATM page, fetch new months, rebuild dashboard
        run: python build_dashboard.py

      - name: Publish if the data changed
        run: |
          git config user.name  "rbi-atm-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain index.html)" ]; then
            git add index.html
            git commit -m "Auto-update RBI ATM/POS/Card data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Dashboard updated and published."
          else
            echo "No new or revised ATM data — nothing to publish."
          fi

      - name: Open a failure alert (deduped)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ RBI ATM auto-update failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "A scheduled RBI ATM/POS/Card dashboard update **failed**.",
              "",
              `Run log: ${runUrl}`,
              "",
              "Most likely cause: RBI's download was blocked, or the page/file format changed.",
              "Re-run the workflow (Actions → Run workflow), or update manually — see SETUP.md.",
              "",
              "_This issue will close automatically on the next successful run._"
            ].join("\n");
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: "open"
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }

      - name: Close the failure alert on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ RBI ATM auto-update failed";
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: "open"
            });
            for (const i of issues.filter(x => x.title === title)) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: i.number, state: "closed" });
            }
